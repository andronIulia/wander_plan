name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Lint server
        working-directory: server
        run: npm run lint

      - name: Run server tests
        working-directory: server
        run: npm test
        env:
          JWT_SECRET: ci_test_secret_not_for_production
          NODE_ENV: test

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build
        env:
          CI: false

  notify:
    name: Status summary
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: always()
    steps:
      - name: Report result
        run: |
          if [ "${{ needs.lint-and-test.result }}" == "success" ]; then
            echo "✅ All checks passed"
          else
            echo "❌ One or more checks failed"
            exit 1
          fi
